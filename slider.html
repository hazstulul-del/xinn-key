<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verifikasi Keamanan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #1e293b; border-radius: 20px; padding: 40px 32px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,.5); }
        .icon { width: 64px; height: 64px; margin: 0 auto 20px; background: #1e40af; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        h2 { color: #f1f5f9; font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
        .slider-container {
            background: #334155; border-radius: 30px; height: 54px; position: relative;
            overflow: hidden; user-select: none; cursor: pointer;
        }
        .slider-track { position: absolute; left: 0; top: 0; height: 100%; background: #22c55e; border-radius: 30px; width: 0%; transition: width .1s; }
        .slider-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #e2e8f0; font-size: 15px; font-weight: 500; z-index: 1; pointer-events: none; }
        .slider-btn {
            position: absolute; left: 3px; top: 3px; width: 48px; height: 48px;
            background: #fff; border-radius: 50%; z-index: 2; display: flex;
            align-items: center; justify-content: center; font-size: 20px;
            transition: left .1s; box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        .complete .slider-text { color: #fff; }
        .dots { display: flex; justify-content: center; gap: 6px; margin-top: 20px; }
        .dot { width: 8px; height: 8px; background: #475569; border-radius: 50%; }
        .dot.active { background: #22c55e; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#128274;</div>
        <h2>Verifikasi Keamanan</h2>
        <p>Geser untuk verifikasi bahwa Anda manusia</p>
        <div class="slider-container" id="sliderContainer">
            <div class="slider-track" id="sliderTrack"></div>
            <div class="slider-text" id="sliderText">Geser ke kanan &#8594;</div>
            <div class="slider-btn" id="sliderBtn">&#8594;</div>
        </div>
        <div class="dots">
            <div class="dot active"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
        </div>
    </div>
    <script>
        var container = document.getElementById('sliderContainer');
        var btn = document.getElementById('sliderBtn');
        var track = document.getElementById('sliderTrack');
        var text = document.getElementById('sliderText');
        var max = container.clientWidth - btn.clientWidth - 6;
        var dragging = false, startX, offset = 0;

        function setPos(x) {
            if (x < 0) x = 0;
            if (x > max) x = max;
            offset = x;
            btn.style.left = x + 'px';
            track.style.width = (x / max * 100) + '%';
            if (x >= max) {
                text.textContent = 'Terverifikasi! &#10004;';
                container.classList.add('complete');
                document.getElementById('dot2').classList.add('active');
                document.getElementById('dot3').classList.add('active');
                setTimeout(function(){
                    window.location.href = '/topup';
                }, 800);
            }
        }

        btn.addEventListener('mousedown', function(e){ dragging = true; startX = e.clientX - offset; e.preventDefault(); });
        btn.addEventListener('touchstart', function(e){ dragging = true; startX = e.touches[0].clientX - offset; });
        document.addEventListener('mousemove', function(e){ if(dragging){ setPos(e.clientX - startX); } });
        document.addEventListener('touchmove', function(e){ if(dragging){ setPos(e.touches[0].clientX - startX); } });
        document.addEventListener('mouseup', function(){ if(dragging && offset < max) { setPos(0); } dragging = false; });
        document.addEventListener('touchend', function(){ if(dragging && offset < max) { setPos(0); } dragging = false; });
    </script>
</body>
</html>
